devices: (
{
  name: "MX Master 3S";

  # DPI settings
  dpi: 8000;

  # Enable smartshift for the scroll wheel
  smartshift: {
    on: false;
    # threshold: 15;
  };

  # Enable high-resolution scrolling
  hiresscroll: {
    hires: false;
    invert: false;
    target: false;
  };

  thumbwheel: {
    divert: true;
    invert: false;
    left: {
      mode: "OnInterval";
      interval: 10;
      action: {
        type: "Keypress";
        keys: ["KEY_LEFTCTRL", "KEY_MINUS"]; 
      };
    };
    right: {
      mode: "OnInterval";
      interval: 10;
      action: {
        type: "Keypress";
        keys: ["KEY_LEFTCTRL", "KEY_EQUAL"]; 
      };
    };
  };

